- name: create ec2 and r53
  hosts: local
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id:  sg-047f642404153e5df # Replace with your SG ID
    zone_id: Z053696412VIZBW5HM6XW # Replace with your ID
    domain_name: "daws86s.bond"
    instance: 
    - mongodb
    - redis
    - mysql
  tasks:
  - name: Create ec2 instances
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instance }}"  
    register: ec2_output


  - name: print the  ec2_output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"

